# LegalAI MVP - iii Engine Configuration
# 完整配置：9 个官方 worker + engine builtins
# 注：HTTP API、Stream、State、Queue、Cron 等通过单独的 worker 配置
#     iii-http 提供 3111 端口；iii-stream 提供 3112 端口

workers:
  # ──────────────────────────────────────────────────────
  # Engine 内置 Worker
  # ──────────────────────────────────────────────────────

  # iii-observability — OpenTelemetry 追踪/指标/日志
  - name: iii-observability
    config:
      enabled: true
      exporter: memory
      logs_console_output: true
      logs_enabled: true
      logs_exporter: memory
      logs_max_count: 1000
      logs_retention_seconds: 3600
      memory_max_spans: 1000000
      metrics_enabled: true
      metrics_exporter: memory
      metrics_max_count: 10000
      metrics_retention_seconds: 3600
      sampling_ratio: 1
      service_name: legalai
      service_version: ${SERVICE_VERSION:__III_ENGINE_VERSION__}

  # iii-queue — 异步任务队列（持久化+重试+DLQ）
  - name: iii-queue
    config:
      adapter:
        name: builtin
      queue_configs:
        default:
          max_retries: 5
          concurrency: 10
          type: standard
          backoff_ms: 1000
        document-parse:
          max_retries: 3
          concurrency: 5
          type: standard
        analysis:
          max_retries: 3
          concurrency: 3
          type: standard
        docgen:
          max_retries: 2
          concurrency: 2
          type: standard

  # iii-state — KV 状态管理
  - name: iii-state
    config:
      adapter:
        config:
          file_path: ./data/state_store.db
          store_method: file_based
        name: kv

  # iii-stream — SSE 流式响应
  - name: iii-stream
    config:
      host: 127.0.0.1
      port: 3112
      adapter:
        config:
          file_path: ./data/stream_store
          store_method: file_based
        name: kv

  # iii-cron — 定时任务（jobs 通过 SDK 动态注册）
  - name: iii-cron
    config:
      adapter:
        name: kv
        config:
          lock_ttl_ms: 30000
          lock_index: cron_locks

  # iii-pubsub — 发布/订阅事件
  - name: iii-pubsub
    config:
      adapter:
        name: local

  # iii-directory — 引擎自省 + skills/prompts
  - name: iii-directory
    config:
      download_timeout_ms: 60000
      registry_url: https://api.workers.iii.dev
      skills_folder: ./skills

  # ─────────────────────────────────────────────────────────
  # Agent Bundle (harness) — 不集成
  # 详见 docs/worker-integration-plan.md 「冲突 A：harness vs pi-internal」
  # harness 含 turn-orchestrator / session / provider-* 等子 worker，
  # 与 pi-internal 的能力发现 + 任务规划/执行职能重叠
  # 如未来需 turn FSM / session 树能力，再评估引入

  # ──────────────────────────────────────────────────────
  # HTTP API (暴露 worker 函数为 REST 端点)
  # ──────────────────────────────────────────────────────
  - name: iii-http
    config:
      port: 3111
      host: 127.0.0.1
      default_timeout: 180000
      concurrency_request_limit: 1024
      cors:
        allowed_origins:
        - '*'
        allowed_methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS

  # ──────────────────────────────────────────────────────
  # 官方 Binary Worker（已通过 iii worker add 安装）
  # ──────────────────────────────────────────────────────

  # console — Web UI 管理界面 (http://localhost:3113)
  - name: console
    config:
      http_port: 3113

  # shell — Unix shell + 文件系统
  - name: shell
    config:
      allowed_env:
      - PATH
      - HOME
      - LANG
      - LC_ALL
      - TERM
      allowlist:
      - ls
      - cat
      - pwd
      - echo
      - grep
      - wc
      - head
      - tail
      - sort
      - uniq
      - cut
      - date
      - whoami
      - hostname
      - which
      - jq
      - uname
      - df
      - du
      - ps
      - printenv
      - basename
      - dirname
      - pg_dump
      - psql
      - redis-cli
      default_timeout_ms: 10000
      denylist_patterns:
      - rm\s+-rf\s+/
      - :\(\)\s*\{\s*:\|
      - mkfs
      - dd\s+if=
      - shutdown
      - reboot
      - /etc/passwd
      - /etc/shadow
      fs:
        allow_unjailed: false
        denylist_paths:
        - /etc/passwd
        - /etc/shadow
        host_root: /tmp
        max_read_bytes: 16777216
        max_write_bytes: 16777216
      inherit_env: false
      job_retention_secs: 3600
      max_concurrent_jobs: 16
      max_output_bytes: 1048576
      max_timeout_ms: 30000
      sandbox:
        enabled: true
      working_dir: null

  # coder — 路径隔离的文件编辑器
  - name: coder
    config:
      base_path: ./
      list_default_page_size: 100
      list_max_page_size: 1000
      max_read_bytes: 10485760
      max_write_bytes: 10485760
      non_accessible_globs:
      - '**/.env'
      - '**/.env.*'
      - '**/*.pem'
      - '**/*.key'
      - '**/secrets/**'
      - '**/node_modules/**'
      - '**/.git/**'
      search_default_max_line_bytes: 4096
      search_default_max_matches: 1000
      tree_default_depth: 4
      tree_per_folder_limit: 50

  # iii-lsp — 语言服务器（CLI 工具）
  - name: iii-lsp

  # configuration — 配置管理
  - name: configuration
    config:
      adapter:
        config:
          directory: ./data/configuration
        name: fs
      ttl_seconds: 0

  # database — PostgreSQL/MySQL/SQLite
  - name: database
    config:
      databases:
        primary:
          pool:
            acquire_timeout_ms: 5000
            idle_timeout_ms: 30000
            max: 10
          url: postgresql://postgres:legalai123@localhost:5432/legalai
          tls:
            mode: disable

  # image-resize — 图片处理
  - name: image-resize
    config:
      height: 800
      quality:
        jpeg: 85
        webp: 80
      strategy: scale-to-fit
      width: 800

  # storage — 对象存储（从 GitHub release storage/v0.1.1 手动安装）
  - name: storage
    config:
      providers:
        local:
          data_dir: ./data/storage
      buckets:
        documents:
          provider: local
          bucket: documents
        exports:
          provider: local
          bucket: exports

  # mcp — MCP 2025-06-18 Streamable HTTP 桥接（从源码 cargo build --release）
  # 暴露业务函数为 MCP 工具，供 Claude Desktop / Cursor / Continue 调用
  - name: mcp
    config:
      api_path: /mcp
      require_expose: false
      hidden_prefixes:
        - "engine::"
        - "state::"
        - "stream::"
        - "iii."
        - "iii::"
        - "mcp::"
        - "a2a::"
        - "skills::"
        - "prompts::"

  - name: email
    config:
      accounts:
        alice:
          from: Alice <alice@local.test>
          provider: smtp
          smtp:
            host: localhost
            port: 3025
            starttls: false
        bob:
          from: Bob <bob@local.test>
          provider: smtp
          smtp:
            host: localhost
            port: 3025
            starttls: false
      limits:
        imap_connect_timeout_ms: 15000
        max_attachment_bytes: 26214400
        max_recipients: 100
        send_timeout_ms: 30000
