# LegalAI MVP - iii Engine Configuration

# 引擎基础配置
engine:
  name: legal-ai-mvp
  version: 0.1.0

# HTTP API 配置
api:
  port: 3111
  cors:
    enabled: true
    origins:
      - "http://localhost:3000"
      - "http://localhost:8080"
      - "https://app.legalai.local"

# WebSocket 配置 (worker 连接)
websocket:
  port: 49134

# 日志配置
logging:
  level: info
  format: json
  include_timestamp: true

# Worker 注册
workers:
  auto_discover: true
  paths:
    - ./workers/upload
    - ./workers/document
    - ./workers/knowledge
    - ./workers/analysis
    - ./workers/docgen
    - ./workers/pi-user
    - ./workers/pi-internal

# HTTP Trigger 配置
http:
  request_timeout: 30000
  max_body_size: 52428800  # 50MB
  enable_swagger: true
  swagger_path: /api/docs

# 队列配置 (开发环境用内存，生产用 Redis)
queue:
  type: memory  # development
  # type: redis
  # url: redis://localhost:6379

# 存储配置
storage:
  type: local
  path: ./data/uploads
  max_file_size: 52428800  # 50MB

# 观测配置
observability:
  otlp:
    enabled: false
    # endpoint: http://localhost:4317
  prometheus:
    enabled: false
    port: 9464

# 环境变量 (会被 .env 覆盖)
env:
  NODE_ENV: development
  LOG_LEVEL: info
